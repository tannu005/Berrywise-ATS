services:
  - type: web
    name: recruitment-pipeline-backend
    env: node
    plan: free
    rootDir: backend
    buildCommand: npm install
    startCommand: node server.js
    envVars:
      - key: PORT
        value: 5000
      - key: NODE_ENV
        value: production
      - key: JETRO_API_KEY
        value: your_jetro_api_key_here
